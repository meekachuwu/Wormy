<!DOCTYPE html>
<html lang="en">
<head>
	<title>Wormy</title>
	
	<meta name="Description" content="A non-seizure inducing version of StaggeringBeauty">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta charset="utf-8">

	<link href="Assets/style.css" rel="stylesheet">
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.22/paper.min.js"></script>
	<script src="https://code.createjs.com/1.0.0/tweenjs.js"></script>
	<script src="https://jonobr1.com/Physics/build/physics.min.js"></script>

	<script canvas="canvas">
		paper.install(window);	// Intiate
		window.onload = function() {
			let canvas = document.getElementById("canvas");
			paper.setup(canvas);

			let path = new paper.Path();
			let amplitude = 20;      // Controls how wide the wiggles are
			let segmentLength = 10;  // Distance between path segments
			let yStart = paper.view.center.y; // Start at the middle of the canvas
			path.smooth(); // Make the path curvy
			path.strokeColor = 'black';

			// Construct the wiggling path
			path.moveTo(new paper.Point(paper.view.center.x, yStart));
			for (i=0; i<=300; i++) {
				let x = paper.view.center.x + amplitude * Math.sin(i/10); 
				let y = yStart + i * segmentLength; 
				path.lineTo(new paper.Point(x,y));
			}
		}
	</script>
</head>
<body>
	<canvas id="canvas" resize></canvas>
</body>
</html>
